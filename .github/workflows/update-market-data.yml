name: Update watchlist market data
# Refreshes cached quotes and K-lines for 米法的自选股.

on:
  workflow_dispatch:
  schedule:
    - cron: "45 8 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Fetch latest quote
        run: node scripts/update-market-data.mjs
      - name: Commit quote data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update watchlist market data"
          file_pattern: "data/watchlist-data.json data/quote.json data/quote-history.json"
